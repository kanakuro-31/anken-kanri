<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>案件管理</title>
<style>
  :root{
    --bg:#f7f8fb;
    --card:#ffffff;
    --border:#f0f1f4;
    --text:#1f2330;
    --sub:#9296a3;
    --accent:#5b5fef;
    --accent-light:#eef0ff;
    --danger:#ef4444;
    --danger-light:#fef2f2;
    --green:#10b981;
    --green-light:#ecfdf5;
    --orange:#f59e0b;
    --orange-light:#fff7ed;
    --gray:#a8acb8;
    --gray-light:#f4f5f7;
    --radius:16px;
    --shadow:0 1px 3px rgba(31,35,48,0.05), 0 1px 2px rgba(31,35,48,0.04);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Hiragino Sans",Meiryo,sans-serif;
    background:var(--bg);
    color:var(--text);
    padding-bottom:90px;
    -webkit-tap-highlight-color: transparent;
  }
  header{
    background:#fff;
    border-bottom:1px solid var(--border);
    padding:16px 18px;
    position:sticky;
    top:0;
    z-index:50;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .header-title{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .header-icon{
    width:38px;height:38px;
    border-radius:11px;
    background:var(--accent);
    color:#fff;
    display:flex;align-items:center;justify-content:center;
    font-size:18px;
  }
  h1{
    font-size:17px;
    margin:0;
    font-weight:700;
  }
  .sort-btn{
    font-size:12px;
    font-weight:700;
    background:var(--gray-light);
    border:none;
    padding:8px 12px;
    border-radius:20px;
    color:var(--text);
    cursor:pointer;
  }

  main{padding:16px;}
  .page{display:none;}
  .page.active{display:block;}

  /* ---------- ダッシュボードカード ---------- */
  .stat-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:16px;
  }
  .stat-card{
    background:var(--card);
    border:none;
    box-shadow:var(--shadow);
    border-radius:var(--radius);
    padding:14px;
    cursor:pointer;
  }
  .stat-card.full{grid-column:1 / -1;}
  .stat-label{
    font-size:12px;
    color:var(--sub);
    font-weight:600;
    margin-bottom:6px;
  }
  .stat-value{
    font-size:24px;
    font-weight:700;
    color:var(--text);
  }
  .stat-card.accent .stat-value{color:var(--accent);}
  .stat-sub{
    font-size:11px;
    color:var(--gray);
    margin-top:4px;
  }
  .stat-card.active-filter{
    background:var(--accent-light);
  }

  /* ---------- フィルタタブ ---------- */
  .filter-tabs{
    display:flex;
    gap:6px;
    overflow-x:auto;
    margin-bottom:14px;
    padding-bottom:2px;
  }
  .filter-tab{
    flex-shrink:0;
    padding:8px 16px;
    border-radius:20px;
    border:1px solid var(--border);
    background:#fff;
    font-size:13px;
    font-weight:600;
    color:var(--sub);
    cursor:pointer;
  }
  .filter-tab.active{
    background:var(--accent-light);
    color:var(--accent);
    border-color:var(--accent-light);
  }

  .section-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:18px 0 10px 0;
  }
  .section-head .title{
    font-size:13px;
    font-weight:700;
    color:var(--sub);
  }
  .section-head .count{
    font-size:12px;
    font-weight:600;
    color:var(--gray);
    background:var(--gray-light);
    padding:3px 10px;
    border-radius:20px;
  }

  /* ---------- 案件カード ---------- */
  .card{
    background:var(--card);
    border:none;
    box-shadow:var(--shadow);
    border-radius:var(--radius);
    margin-bottom:10px;
    overflow:hidden;
  }
  .card-main{
    padding:14px;
    cursor:pointer;
  }
  .card-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:8px;
  }
  .card-name{
    font-size:15px;
    font-weight:700;
    line-height:1.4;
  }
  .card-client{
    font-size:12px;
    color:var(--sub);
    margin-top:2px;
  }
  .badge{
    font-size:11px;
    font-weight:700;
    padding:4px 10px;
    border-radius:20px;
    white-space:nowrap;
    flex-shrink:0;
  }
  .badge-未着手{background:var(--gray-light);color:#6b7280;}
  .badge-編集中{background:var(--accent-light);color:var(--accent);}
  .badge-修正中{background:var(--orange-light);color:var(--orange);}
  .badge-完了{background:var(--green-light);color:var(--green);}

  .card-bottom{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:10px;
  }
  .deadline-tag{
    font-size:11px;
    font-weight:600;
    padding:4px 8px;
    border-radius:8px;
    background:var(--gray-light);
    color:var(--sub);
    display:flex;
    align-items:center;
    gap:4px;
  }
  .deadline-tag.overdue{
    background:var(--danger-light);
    color:var(--danger);
  }
  .card-amount{
    font-size:16px;
    font-weight:700;
  }
  .card-arrow{
    text-align:center;
    color:var(--gray);
    font-size:11px;
    padding-top:4px;
  }

  .card-detail{
    display:none;
    padding:0 14px 14px 14px;
    border-top:1px solid var(--border);
  }
  .card.open .card-detail{display:block;}
  .card.open .card-arrow{display:none;}
  .detail-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin:12px 0;
    font-size:13px;
  }
  .detail-grid .label{font-size:11px;color:var(--sub);margin-bottom:2px;}
  .detail-grid .v{font-weight:600;}
  .detail-grid .v.wage{color:var(--accent);}
  .card-actions{
    display:flex;
    gap:8px;
  }
  .card-actions button{
    flex:1;
    padding:10px;
    border-radius:10px;
    border:1px solid var(--border);
    background:#fff;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
  }
  .card-actions .edit-btn{color:var(--accent);}
  .card-actions .del-btn{color:var(--danger);}

  .empty{
    text-align:center;
    color:var(--sub);
    padding:40px 10px;
    font-size:13px;
  }

  /* ---------- 売上履歴ページ ---------- */
  .year-tabs{
    display:flex;
    gap:18px;
    border-bottom:1px solid var(--border);
    margin-bottom:16px;
    overflow-x:auto;
  }
  .year-tab{
    flex-shrink:0;
    padding:8px 2px 12px 2px;
    font-size:17px;
    font-weight:700;
    color:var(--sub);
    border-bottom:2px solid transparent;
    background:none;border:none;
    cursor:pointer;
  }
  .year-tab.active{
    color:var(--accent);
    border-bottom:2px solid var(--accent);
  }
  .year-total-box{
    background:linear-gradient(135deg,var(--accent-light),#f5f3ff);
    border:none;
    box-shadow:var(--shadow);
    border-radius:var(--radius);
    padding:18px;
    margin-bottom:16px;
  }
  .year-total-label{
    font-size:13px;
    font-weight:700;
    color:var(--accent);
    margin-bottom:4px;
  }
  .year-total-sub{
    font-size:12px;
    color:var(--sub);
    margin-bottom:8px;
  }
  .year-total-value{
    font-size:30px;
    font-weight:700;
    color:var(--accent);
  }
  .month-item{
    background:var(--card);
    border:none;
    box-shadow:var(--shadow);
    border-radius:var(--radius);
    margin-bottom:10px;
    overflow:hidden;
  }
  .month-head{
    padding:14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    cursor:pointer;
  }
  .month-head-left{
    font-size:15px;
    font-weight:700;
  }
  .month-head-count{
    font-size:11px;
    font-weight:600;
    color:var(--sub);
    background:var(--gray-light);
    padding:2px 8px;
    border-radius:10px;
    margin-left:6px;
  }
  .month-head-right{
    display:flex;
    align-items:center;
    gap:8px;
  }
  .month-head-amount{
    font-size:16px;
    font-weight:700;
    color:var(--accent);
  }
  .month-head .arrow{
    color:var(--gray);
    transition:transform .2s;
    font-size:12px;
  }
  .month-item.open .arrow{transform:rotate(180deg);}
  .month-body{
    display:none;
    padding:0 14px 14px 14px;
  }
  .month-item.open .month-body{display:block;}
  .month-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 0;
    border-top:1px solid var(--border);
    font-size:13px;
  }
  .month-row .mr-name{font-weight:600;}
  .month-row .mr-client{font-size:11px;color:var(--sub);margin-top:2px;}
  .month-row .mr-amount{font-weight:700;text-align:right;}
  .month-row .mr-net{font-size:11px;color:var(--sub);text-align:right;}

  /* ---------- 日報ページ ---------- */
  .log-date-group{margin-bottom:18px;}
  .log-date-head{
    font-size:13px;
    font-weight:700;
    color:var(--sub);
    margin-bottom:8px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .log-date-head .lh-total{
    font-size:11px;
    font-weight:600;
    color:var(--accent);
    background:var(--accent-light);
    padding:2px 8px;
    border-radius:10px;
  }
  .log-card{
    background:var(--card);
    border:none;
    box-shadow:var(--shadow);
    border-radius:14px;
    padding:14px;
    margin-bottom:8px;
  }
  .log-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
  }
  .log-project{font-size:14px;font-weight:700;}
  .log-time{font-size:12px;color:var(--sub);margin-top:3px;}
  .log-hours{
    font-size:13px;
    font-weight:700;
    color:var(--accent);
    background:var(--accent-light);
    padding:3px 10px;
    border-radius:20px;
    white-space:nowrap;
  }
  .log-memo{
    font-size:12px;
    color:var(--text);
    margin-top:8px;
    padding-top:8px;
    border-top:1px solid var(--border);
    line-height:1.5;
    white-space:pre-wrap;
  }
  .log-actions{
    display:flex;
    gap:8px;
    margin-top:10px;
  }
  .log-actions button{
    flex:1;
    padding:8px;
    border-radius:10px;
    border:1px solid var(--border);
    background:#fff;
    font-size:12px;
    font-weight:600;
    cursor:pointer;
  }
  .log-actions .edit-btn{color:var(--accent);}
  .log-actions .del-btn{color:var(--danger);}

  /* ---------- 新規追加ボタン(FAB) ---------- */
  .fab{
    position:fixed;
    right:20px;
    bottom:84px;
    width:56px;height:56px;
    border-radius:50%;
    background:var(--accent);
    color:#fff;
    font-size:26px;
    border:none;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 6px 16px rgba(91,95,239,0.35);
    cursor:pointer;
    z-index:60;
  }

  /* ---------- 下部タブ ---------- */
  .bottom-nav{
    position:fixed;
    bottom:0;left:0;right:0;
    background:#fff;
    border-top:1px solid var(--border);
    display:flex;
    z-index:55;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .nav-btn{
    flex:1;
    border:none;
    background:none;
    padding:10px 0 8px 0;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:3px;
    font-size:11px;
    font-weight:600;
    color:var(--gray);
    cursor:pointer;
  }
  .nav-btn .icon{font-size:20px;}
  .nav-btn.active{color:var(--accent);}

  /* ---------- モーダル(フォーム) ---------- */
  .modal-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.4);
    z-index:100;
    align-items:flex-end;
  }
  .modal-overlay.active{display:flex;}
  .modal{
    background:#fff;
    width:100%;
    max-height:92vh;
    overflow-y:auto;
    border-radius:22px 22px 0 0;
    padding:20px;
    animation:slideUp .2s ease;
  }
  @keyframes slideUp{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .modal h2{
    font-size:16px;
    margin:0 0 16px 0;
  }
  .form-group{margin-bottom:14px;}
  .form-group label{
    display:block;
    font-size:12px;
    font-weight:600;
    color:var(--sub);
    margin-bottom:6px;
  }
  .form-group .hint{
    font-size:11px;
    color:var(--gray);
    font-weight:400;
    margin-left:4px;
  }
  .form-group input[type="text"],
  .form-group input[type="number"],
  .form-group input[type="date"],
  .form-group input[type="time"],
  .form-group textarea,
  .form-group select{
    width:100%;
    padding:12px;
    border:1px solid var(--border);
    border-radius:10px;
    font-size:15px;
    background:#fafbfc;
    font-family:inherit;
  }
  .form-group textarea{resize:vertical;min-height:70px;}
  .radio-group{
    display:flex;
    gap:8px;
  }
  .radio-group label{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    padding:12px;
    border:1px solid var(--border);
    border-radius:10px;
    font-size:14px;
    font-weight:600;
    color:var(--text);
    cursor:pointer;
  }
  .radio-group input{accent-color:var(--accent);}
  .radio-group input:checked + span{color:var(--accent);}
  .date-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }
  .calc-hours-box{
    background:var(--accent-light);
    border-radius:10px;
    padding:10px 12px;
    font-size:13px;
    font-weight:600;
    color:var(--accent);
    margin-bottom:14px;
  }
  .modal-btns{
    display:flex;
    gap:10px;
    margin-top:18px;
  }
  .modal-btns button{
    flex:1;
    padding:14px;
    border-radius:12px;
    font-size:15px;
    font-weight:700;
    border:none;
    cursor:pointer;
  }
  .save-btn{background:var(--accent);color:#fff;}
  .cancel-btn{background:var(--gray-light);color:var(--text);}

  /* バックアップエリア */
  .backup-area{
    background:var(--card);
    border:none;
    box-shadow:var(--shadow);
    border-radius:var(--radius);
    padding:16px;
    margin-top:24px;
  }
  .backup-area h3{
    font-size:13px;
    margin:0 0 10px 0;
    color:var(--sub);
  }
  .backup-area button{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid var(--border);
    background:#fff;
    font-size:13px;
    font-weight:600;
    margin-bottom:8px;
    cursor:pointer;
  }
  .backup-area textarea{
    width:100%;
    height:80px;
    border:1px solid var(--border);
    border-radius:10px;
    padding:10px;
    font-size:12px;
    margin-bottom:8px;
    font-family:monospace;
  }
  .toast{
    position:fixed;
    bottom:90px;
    left:50%;
    transform:translateX(-50%);
    background:#1f2330;
    color:#fff;
    padding:10px 18px;
    border-radius:20px;
    font-size:13px;
    z-index:200;
    opacity:0;
    pointer-events:none;
    transition:opacity .3s;
  }
  .toast.show{opacity:1;}
</style>
</head>
<body>

<header>
  <div class="header-title">
    <div class="header-icon" id="headerIcon">🎬</div>
    <h1 id="headerTitle">案件管理</h1>
  </div>
  <button class="sort-btn" id="sortBtn">納期順</button>
</header>

<main>

  <!-- ===== 案件ページ ===== -->
  <div class="page active" id="page-projects">

    <div class="stat-row">
      <div class="stat-card full accent">
        <div class="stat-label">今月の確定売上(納品完了ベース)</div>
        <div class="stat-value" id="statMonthRevenue">¥0</div>
        <div class="stat-sub" id="statMonthLabel"></div>
      </div>
      <div class="stat-card" id="statInProgress">
        <div class="stat-label">進行中</div>
        <div class="stat-value" id="statInProgressVal">0件</div>
      </div>
      <div class="stat-card" id="statDone">
        <div class="stat-label">完了(今月)</div>
        <div class="stat-value" id="statDoneVal">0件</div>
      </div>
    </div>

    <div class="filter-tabs" id="filterTabs">
      <button class="filter-tab active" data-status="all">すべて</button>
      <button class="filter-tab" data-status="未着手">未着手</button>
      <button class="filter-tab" data-status="編集中">編集中</button>
      <button class="filter-tab" data-status="修正中">修正中</button>
      <button class="filter-tab" data-status="完了">完了</button>
    </div>

    <div class="section-head">
      <span class="title">案件一覧</span>
      <span class="count" id="listCount">0件</span>
    </div>
    <div id="projectList"></div>

    <!-- バックアップ -->
    <div class="backup-area">
      <h3>💾 データのバックアップ／復元</h3>
      <button id="backupBtn">データをバックアップ（コピー）</button>
      <textarea id="restoreText" placeholder="ここに復元したいバックアップデータを貼り付け"></textarea>
      <button id="restoreBtn">データを復元する</button>
    </div>
  </div>

  <!-- ===== 日報ページ ===== -->
  <div class="page" id="page-logs">
    <div id="logList"></div>
  </div>

  <!-- ===== 売上履歴ページ ===== -->
  <div class="page" id="page-sales">
    <div class="year-total-box" id="allTimeBox" style="background:linear-gradient(135deg,#ecfdf5,#f0fdfa);margin-bottom:18px;">
      <div class="year-total-label" style="color:var(--green);">📈 全期間 累計売上</div>
      <div class="year-total-sub" id="allTimeSub">0件の案件</div>
      <div class="year-total-value" style="color:var(--green);" id="allTimeValue">¥0</div>
    </div>
    <div class="year-tabs" id="yearTabs"></div>
    <div class="year-total-box">
      <div class="year-total-label" id="yearTotalLabel">年 合計売上</div>
      <div class="year-total-sub" id="yearTotalSub">0件の案件</div>
      <div class="year-total-value" id="yearTotalValue">¥0</div>
    </div>
    <div id="monthlyList"></div>
  </div>

</main>

<button class="fab" id="openAddBtn">＋</button>

<div class="bottom-nav">
  <button class="nav-btn active" data-page="projects">
    <span class="icon">📋</span><span>案件</span>
  </button>
  <button class="nav-btn" data-page="logs">
    <span class="icon">📝</span><span>日報</span>
  </button>
  <button class="nav-btn" data-page="sales">
    <span class="icon">📊</span><span>売上履歴</span>
  </button>
</div>

<!-- 案件モーダル -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">新しい案件を追加</h2>
    <form id="projectForm">
      <input type="hidden" id="projectId">
      <div class="form-group">
        <label>案件名</label>
        <input type="text" id="f_name" required>
      </div>
      <div class="form-group">
        <label>クライアント名</label>
        <input type="text" id="f_client" required>
      </div>
      <div class="form-group">
        <label>案件タイプ</label>
        <div class="radio-group">
          <label><input type="radio" name="f_type" value="直案件" checked><span>直案件</span></label>
          <label><input type="radio" name="f_type" value="クラウドワークス"><span>クラウドワークス</span></label>
        </div>
      </div>

      <div class="form-group">
        <label>初稿納期日 <span class="hint">(任意)</span></label>
        <input type="date" id="f_firstDraft">
      </div>
      <div class="form-group">
        <label>最終納期日</label>
        <input type="date" id="f_deadline" required>
      </div>
      <div class="form-group">
        <label>納品完了日 <span class="hint">(完了したら入力。売上集計の基準日)</span></label>
        <input type="date" id="f_delivered">
      </div>

      <div class="form-group">
        <label>契約金額（円）</label>
        <input type="number" id="f_amount" min="0" required>
      </div>
      <div class="form-group">
        <label>ステータス</label>
        <select id="f_status">
          <option value="未着手">未着手</option>
          <option value="編集中">編集中</option>
          <option value="修正中">修正中</option>
          <option value="完了">完了</option>
        </select>
      </div>
      <div class="modal-btns">
        <button type="button" class="cancel-btn" id="cancelBtn">キャンセル</button>
        <button type="submit" class="save-btn">保存する</button>
      </div>
    </form>
  </div>
</div>

<!-- 日報モーダル -->
<div class="modal-overlay" id="logModalOverlay">
  <div class="modal">
    <h2 id="logModalTitle">日報を入力</h2>
    <form id="logForm">
      <input type="hidden" id="logId">
      <div class="form-group">
        <label>案件名 <span class="hint">(完了以外の案件)</span></label>
        <select id="l_projectId" required></select>
      </div>
      <div class="form-group">
        <label>作業した日</label>
        <input type="date" id="l_date" required>
      </div>
      <div class="date-row">
        <div class="form-group">
          <label>開始時間</label>
          <input type="time" id="l_start" required>
        </div>
        <div class="form-group">
          <label>終了時間</label>
          <input type="time" id="l_end" required>
        </div>
      </div>
      <div class="calc-hours-box" id="calcHoursBox">かかった時間：0.0時間</div>
      <div class="form-group">
        <label>メモ <span class="hint">(カット・テロップなど作業内容)</span></label>
        <textarea id="l_memo" placeholder="例）粗カット、テロップ入れ、BGM調整"></textarea>
      </div>
      <div class="modal-btns">
        <button type="button" class="cancel-btn" id="logCancelBtn">キャンセル</button>
        <button type="submit" class="save-btn">保存する</button>
      </div>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  const STORAGE_KEY = "video_edit_data_v3";
  let projects = [];
  let workLogs = [];
  let currentPage = "projects";
  let currentFilter = "all";
  let sortAsc = true;
  let currentYear = null;
  let openMonths = {};
  let openCardIds = {};

  /* ---------- データ読み込み・保存・旧データ移行 ---------- */
  function loadData(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw){
        const data = JSON.parse(raw);
        projects = data.projects || [];
        workLogs = data.workLogs || [];
        return;
      }
      // v2(案件のみ)からの移行
      const v2 = localStorage.getItem("video_edit_projects_v2");
      if(v2){
        projects = JSON.parse(v2);
        workLogs = [];
        saveData();
        return;
      }
      // v1からの移行
      const v1 = localStorage.getItem("video_edit_projects_v1");
      if(v1){
        const old = JSON.parse(v1);
        projects = old.map(p=>({
          ...p,
          firstDraft: p.firstDraft || "",
          deadline: p.deadline || "",
          delivered: p.status === "完了" ? (p.delivered || p.deadline || "") : (p.delivered || "")
        }));
        workLogs = [];
        saveData();
        return;
      }
      projects = [];
      workLogs = [];
    }catch(e){
      projects = [];
      workLogs = [];
    }
  }
  function saveData(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify({projects, workLogs}));
  }

  /* ---------- 手取り計算 ---------- */
  function calcNet(type, amount){
    amount = Number(amount) || 0;
    let net;
    if(type === "直案件"){
      net = amount;
    }else{
      net = (amount * 0.78) - 100;
    }
    net = Math.round(net);
    if(net < 0) net = 0;
    return net;
  }

  /* ---------- ユーティリティ ---------- */
  function yen(n){
    return "¥" + Number(n||0).toLocaleString();
  }
  function showToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 1800);
  }
  function uid(){
    return 'p_' + Date.now() + '_' + Math.floor(Math.random()*10000);
  }
  function fmtDate(d){
    if(!d) return "-";
    const parts = d.split('-');
    return parts.length===3 ? `${Number(parts[1])}/${Number(parts[2])}` : d;
  }
  function fmtDateWithWeek(d){
    if(!d) return "-";
    const date = new Date(d);
    const w = ['日','月','火','水','木','金','土'][date.getDay()];
    return `${fmtDate(d)}(${w})`;
  }
  function daysDiff(dateStr){
    const today = new Date();
    today.setHours(0,0,0,0);
    const d = new Date(dateStr);
    d.setHours(0,0,0,0);
    return Math.round((today - d) / 86400000);
  }
  function escapeHtml(str){
    return String(str||"").replace(/[&<>"']/g, (m)=>({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[m]));
  }
  function calcHours(start, end){
    if(!start || !end) return 0;
    const [sh,sm] = start.split(':').map(Number);
    const [eh,em] = end.split(':').map(Number);
    let mins = (eh*60+em) - (sh*60+sm);
    if(mins < 0) mins += 24*60; // 日跨ぎ対応
    return Math.round((mins/60)*100)/100;
  }

  /* ---------- ページ切り替え ---------- */
  document.querySelectorAll('.nav-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      currentPage = btn.dataset.page;
      document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
      document.getElementById('page-' + currentPage).classList.add('active');

      const headerIcon = document.getElementById('headerIcon');
      const headerTitle = document.getElementById('headerTitle');
      const sortBtn = document.getElementById('sortBtn');

      if(currentPage === 'projects'){
        headerIcon.textContent = '🎬';
        headerTitle.textContent = '案件管理';
        sortBtn.style.display = '';
      }else if(currentPage === 'logs'){
        headerIcon.textContent = '📝';
        headerTitle.textContent = '日報';
        sortBtn.style.display = 'none';
        renderLogList();
      }else{
        headerIcon.textContent = '📊';
        headerTitle.textContent = '売上履歴';
        sortBtn.style.display = 'none';
        renderSalesPage();
      }
    });
  });

  document.getElementById('sortBtn').addEventListener('click', ()=>{
    sortAsc = !sortAsc;
    document.getElementById('sortBtn').textContent = sortAsc ? '納期順' : '新着順';
    renderProjectList();
  });

  /* ---------- フィルタタブ ---------- */
  document.querySelectorAll('.filter-tab').forEach(tab=>{
    tab.addEventListener('click', ()=>{
      document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      currentFilter = tab.dataset.status;
      document.getElementById('statInProgress').classList.remove('active-filter');
      document.getElementById('statDone').classList.remove('active-filter');
      renderProjectList();
    });
  });

  document.getElementById('statInProgress').addEventListener('click', ()=> setFilterByStatGroup('progress'));
  document.getElementById('statDone').addEventListener('click', ()=> setFilterByStatGroup('done'));
  function setFilterByStatGroup(group){
    document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));
    document.getElementById('statInProgress').classList.remove('active-filter');
    document.getElementById('statDone').classList.remove('active-filter');
    if(group === 'progress'){
      currentFilter = 'progress';
      document.getElementById('statInProgress').classList.add('active-filter');
    }else{
      currentFilter = '完了';
      document.querySelector('.filter-tab[data-status="完了"]').classList.add('active');
      document.getElementById('statDone').classList.add('active-filter');
    }
    renderProjectList();
  }

  /* ---------- 案件モーダル制御 ---------- */
  const modalOverlay = document.getElementById('modalOverlay');
  const modalTitle = document.getElementById('modalTitle');
  const form = document.getElementById('projectForm');

  function openModalForAdd(){
    modalTitle.textContent = "新しい案件を追加";
    form.reset();
    document.getElementById('projectId').value = "";
    modalOverlay.classList.add('active');
  }
  function openModalForEdit(p){
    modalTitle.textContent = "案件を編集";
    document.getElementById('projectId').value = p.id;
    document.getElementById('f_name').value = p.name;
    document.getElementById('f_client').value = p.client;
    document.querySelectorAll('input[name="f_type"]').forEach(r=>{
      r.checked = (r.value === p.type);
    });
    document.getElementById('f_firstDraft').value = p.firstDraft || "";
    document.getElementById('f_deadline').value = p.deadline;
    document.getElementById('f_delivered').value = p.delivered || "";
    document.getElementById('f_amount').value = p.amount;
    document.getElementById('f_status').value = p.status;
    modalOverlay.classList.add('active');
  }
  function closeModal(){ modalOverlay.classList.remove('active'); }

  document.getElementById('openAddBtn').addEventListener('click', ()=>{
    if(currentPage === 'logs'){
      openLogModalForAdd();
    }else{
      openModalForAdd();
    }
  });
  document.getElementById('cancelBtn').addEventListener('click', closeModal);
  modalOverlay.addEventListener('click', (e)=>{ if(e.target === modalOverlay) closeModal(); });

  document.getElementById('f_status').addEventListener('change', function(){
    const deliveredInput = document.getElementById('f_delivered');
    if(this.value === '完了' && !deliveredInput.value){
      const today = new Date();
      const ymd = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
      deliveredInput.value = ymd;
    }
  });

  form.addEventListener('submit', function(e){
    e.preventDefault();
    const id = document.getElementById('projectId').value;
    const name = document.getElementById('f_name').value.trim();
    const client = document.getElementById('f_client').value.trim();
    const type = document.querySelector('input[name="f_type"]:checked').value;
    const firstDraft = document.getElementById('f_firstDraft').value;
    const deadline = document.getElementById('f_deadline').value;
    const delivered = document.getElementById('f_delivered').value;
    const amount = Number(document.getElementById('f_amount').value);
    const status = document.getElementById('f_status').value;
    const net = calcNet(type, amount);

    if(id){
      const idx = projects.findIndex(p=>p.id === id);
      if(idx > -1){
        projects[idx] = {...projects[idx], name, client, type, firstDraft, deadline, delivered, amount, status, net};
      }
    }else{
      projects.push({id: uid(), name, client, type, firstDraft, deadline, delivered, amount, status, net});
    }
    saveData();
    renderAll();
    closeModal();
    showToast("保存しました");
  });

  function deleteProject(id){
    if(!confirm("この案件を削除しますか？関連する日報も削除されます。")) return;
    projects = projects.filter(p=>p.id !== id);
    workLogs = workLogs.filter(l=>l.projectId !== id);
    saveData();
    renderAll();
    showToast("削除しました");
  }

  /* ---------- 日報モーダル制御 ---------- */
  const logModalOverlay = document.getElementById('logModalOverlay');
  const logModalTitle = document.getElementById('logModalTitle');
  const logForm = document.getElementById('logForm');

  function fillProjectSelect(selectedId){
    const sel = document.getElementById('l_projectId');
    const available = projects.filter(p=> p.status !== '完了' || p.id === selectedId);
    sel.innerHTML = available.map(p=> `<option value="${p.id}">${escapeHtml(p.name)}</option>`).join('');
    if(available.length === 0){
      sel.innerHTML = '<option value="">対象の案件がありません</option>';
    }
    if(selectedId) sel.value = selectedId;
  }

  function openLogModalForAdd(){
    if(projects.filter(p=>p.status !== '完了').length === 0){
      alert("日報を入力できる案件（完了以外）がありません。先に案件を登録してください。");
      return;
    }
    logModalTitle.textContent = "日報を入力";
    logForm.reset();
    document.getElementById('logId').value = "";
    fillProjectSelect();
    const today = new Date();
    const ymd = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
    document.getElementById('l_date').value = ymd;
    updateCalcHours();
    logModalOverlay.classList.add('active');
  }
  function openLogModalForEdit(l){
    logModalTitle.textContent = "日報を編集";
    document.getElementById('logId').value = l.id;
    fillProjectSelect(l.projectId);
    document.getElementById('l_date').value = l.date;
    document.getElementById('l_start').value = l.start;
    document.getElementById('l_end').value = l.end;
    document.getElementById('l_memo').value = l.memo || "";
    updateCalcHours();
    logModalOverlay.classList.add('active');
  }
  function closeLogModal(){ logModalOverlay.classList.remove('active'); }

  document.getElementById('logCancelBtn').addEventListener('click', closeLogModal);
  logModalOverlay.addEventListener('click', (e)=>{ if(e.target === logModalOverlay) closeLogModal(); });

  function updateCalcHours(){
    const start = document.getElementById('l_start').value;
    const end = document.getElementById('l_end').value;
    const h = calcHours(start, end);
    document.getElementById('calcHoursBox').textContent = `かかった時間：${h.toFixed(1)}時間`;
  }
  document.getElementById('l_start').addEventListener('input', updateCalcHours);
  document.getElementById('l_end').addEventListener('input', updateCalcHours);

  logForm.addEventListener('submit', function(e){
    e.preventDefault();
    const id = document.getElementById('logId').value;
    const projectId = document.getElementById('l_projectId').value;
    const date = document.getElementById('l_date').value;
    const start = document.getElementById('l_start').value;
    const end = document.getElementById('l_end').value;
    const memo = document.getElementById('l_memo').value.trim();
    if(!projectId){ alert("案件を選択してください"); return; }
    const hours = calcHours(start, end);
    if(hours <= 0){ alert("終了時間は開始時間より後にしてください"); return; }

    if(id){
      const idx = workLogs.findIndex(l=>l.id === id);
      if(idx > -1){
        workLogs[idx] = {...workLogs[idx], projectId, date, start, end, hours, memo};
      }
    }else{
      workLogs.push({id: uid(), projectId, date, start, end, hours, memo});
    }
    saveData();
    renderAll();
    closeLogModal();
    showToast("日報を保存しました");
  });

  function deleteLog(id){
    if(!confirm("この日報を削除しますか？")) return;
    workLogs = workLogs.filter(l=>l.id !== id);
    saveData();
    renderAll();
    showToast("削除しました");
  }

  /* ---------- 案件カード生成(タップで開閉) ---------- */
  function getProjectHours(projectId){
    return workLogs.filter(l=>l.projectId===projectId).reduce((s,l)=> s + Number(l.hours||0), 0);
  }

  function createCard(p){
    const div = document.createElement('div');
    div.className = 'card' + (openCardIds[p.id] ? ' open' : '');

    const overdue = p.status !== '完了' && p.deadline && daysDiff(p.deadline) > 0;
    const dDiff = p.deadline ? daysDiff(p.deadline) : null;
    let deadlineLabel = p.deadline ? fmtDate(p.deadline) + ' 納期' : '納期未設定';
    if(overdue) deadlineLabel = `${dDiff}日超過`;

    const totalHours = getProjectHours(p.id);
    const wage = totalHours > 0 ? Math.round(p.net / totalHours) : null;

    div.innerHTML = `
      <div class="card-main">
        <div class="card-top">
          <div>
            <div class="card-name">${escapeHtml(p.name)}</div>
            <div class="card-client">${escapeHtml(p.client)}</div>
          </div>
          <span class="badge badge-${p.status}">${p.status}</span>
        </div>
        <div class="card-bottom">
          <span class="deadline-tag ${overdue ? 'overdue':''}">📅 ${deadlineLabel}</span>
          <span class="card-amount">${yen(p.amount)}</span>
        </div>
        <div class="card-arrow">タップで詳細 ▾</div>
      </div>
      <div class="card-detail">
        <div class="detail-grid">
          <div><div class="label">案件タイプ</div><div class="v">${p.type}</div></div>
          <div><div class="label">手取り金額</div><div class="v">${yen(p.net)}</div></div>
          <div><div class="label">初稿納期日</div><div class="v">${p.firstDraft ? fmtDate(p.firstDraft) : '-'}</div></div>
          <div><div class="label">最終納期日</div><div class="v">${p.deadline ? fmtDate(p.deadline) : '-'}</div></div>
          <div><div class="label">納品完了日</div><div class="v">${p.delivered ? fmtDate(p.delivered) : '-'}</div></div>
          <div><div class="label">契約金額</div><div class="v">${yen(p.amount)}</div></div>
          <div><div class="label">累計作業時間</div><div class="v">${totalHours > 0 ? totalHours.toFixed(1)+'時間' : '記録なし'}</div></div>
          <div><div class="label">実質時給</div><div class="v wage">${wage !== null ? yen(wage)+'/h' : '-'}</div></div>
        </div>
        <div class="card-actions">
          <button class="edit-btn">✏️ 編集</button>
          <button class="del-btn">🗑️ 削除</button>
        </div>
      </div>
    `;
    div.querySelector('.card-main').addEventListener('click', ()=>{
      openCardIds[p.id] = !openCardIds[p.id];
      div.classList.toggle('open');
    });
    div.querySelector('.edit-btn').addEventListener('click', (e)=>{ e.stopPropagation(); openModalForEdit(p); });
    div.querySelector('.del-btn').addEventListener('click', (e)=>{ e.stopPropagation(); deleteProject(p.id); });
    return div;
  }

  function renderProjectList(){
    const container = document.getElementById('projectList');
    container.innerHTML = "";

    let list = [...projects];
    if(currentFilter === 'progress'){
      list = list.filter(p=>p.status !== '完了');
    }else if(currentFilter !== 'all'){
      list = list.filter(p=>p.status === currentFilter);
    }

    list.sort((a,b)=>{
      const da = a.deadline || "9999-99-99";
      const db = b.deadline || "9999-99-99";
      return sortAsc ? da.localeCompare(db) : db.localeCompare(da);
    });

    document.getElementById('listCount').textContent = list.length + '件';

    if(list.length === 0){
      container.innerHTML = '<div class="empty">該当する案件がありません</div>';
      return;
    }
    list.forEach(p=> container.appendChild(createCard(p)));
  }

  /* ---------- ダッシュボード統計 ---------- */
  function renderStats(){
    const now = new Date();
    const ym = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
    document.getElementById('statMonthLabel').textContent = `${now.getFullYear()}年${now.getMonth()+1}月`;

    const doneThisMonth = projects.filter(p=> p.status === '完了' && p.delivered && p.delivered.slice(0,7) === ym);
    const monthRevenue = doneThisMonth.reduce((s,p)=> s + Number(p.amount||0), 0);
    document.getElementById('statMonthRevenue').textContent = yen(monthRevenue);

    const inProgressCount = projects.filter(p=> p.status !== '完了').length;
    document.getElementById('statInProgressVal').textContent = inProgressCount + '件';

    document.getElementById('statDoneVal').textContent = doneThisMonth.length + '件';
  }

  /* ---------- 日報ページ描画 ---------- */
  function renderLogList(){
    const container = document.getElementById('logList');
    container.innerHTML = "";

    if(workLogs.length === 0){
      container.innerHTML = '<div class="empty">まだ日報がありません。右下の＋から入力できます</div>';
      return;
    }

    const groups = {};
    workLogs.forEach(l=>{
      if(!groups[l.date]) groups[l.date] = [];
      groups[l.date].push(l);
    });
    const dateKeys = Object.keys(groups).sort().reverse();
    const projMap = {};
    projects.forEach(p=> projMap[p.id] = p);

    dateKeys.forEach(date=>{
      const list = groups[date].sort((a,b)=> a.start.localeCompare(b.start));
      const dayTotal = list.reduce((s,l)=> s + Number(l.hours||0), 0);

      const group = document.createElement('div');
      group.className = 'log-date-group';
      group.innerHTML = `<div class="log-date-head">${fmtDateWithWeek(date)} <span class="lh-total">合計 ${dayTotal.toFixed(1)}時間</span></div>`;

      list.forEach(l=>{
        const p = projMap[l.projectId];
        const card = document.createElement('div');
        card.className = 'log-card';
        card.innerHTML = `
          <div class="log-top">
            <div>
              <div class="log-project">${p ? escapeHtml(p.name) : '(削除された案件)'}</div>
              <div class="log-time">${l.start} 〜 ${l.end}</div>
            </div>
            <span class="log-hours">${Number(l.hours).toFixed(1)}h</span>
          </div>
          ${l.memo ? `<div class="log-memo">${escapeHtml(l.memo)}</div>` : ''}
          <div class="log-actions">
            <button class="edit-btn">✏️ 編集</button>
            <button class="del-btn">🗑️ 削除</button>
          </div>
        `;
        card.querySelector('.edit-btn').addEventListener('click', ()=> openLogModalForEdit(l));
        card.querySelector('.del-btn').addEventListener('click', ()=> deleteLog(l.id));
        group.appendChild(card);
      });
      container.appendChild(group);
    });
  }

  /* ---------- 売上履歴ページ ---------- */
  function getSalesData(){
    return projects.filter(p=> p.status === '完了' && p.delivered);
  }

  function renderSalesPage(){
    const salesData = getSalesData();
    const years = [...new Set(salesData.map(p=>p.delivered.slice(0,4)))].sort().reverse();

    const allTimeTotal = salesData.reduce((s,p)=> s + Number(p.amount||0), 0);
    document.getElementById('allTimeSub').textContent = `${salesData.length}件の案件`;
    document.getElementById('allTimeValue').textContent = yen(allTimeTotal);

    const yearTabsEl = document.getElementById('yearTabs');
    yearTabsEl.innerHTML = "";

    if(years.length === 0){
      document.getElementById('yearTotalLabel').textContent = '合計売上';
      document.getElementById('yearTotalSub').textContent = '0件の案件';
      document.getElementById('yearTotalValue').textContent = '¥0';
      document.getElementById('monthlyList').innerHTML = '<div class="empty">「納品完了日」が入力された完了案件がまだありません</div>';
      return;
    }

    if(!currentYear || !years.includes(currentYear)){
      currentYear = years[0];
    }

    years.forEach(y=>{
      const btn = document.createElement('button');
      btn.className = 'year-tab' + (y === currentYear ? ' active' : '');
      btn.textContent = y + '年';
      btn.addEventListener('click', ()=>{ currentYear = y; renderSalesPage(); });
      yearTabsEl.appendChild(btn);
    });

    const yearList = salesData.filter(p=> p.delivered.slice(0,4) === currentYear);
    const yearTotal = yearList.reduce((s,p)=> s + Number(p.amount||0), 0);
    document.getElementById('yearTotalLabel').textContent = `${currentYear}年 合計売上`;
    document.getElementById('yearTotalSub').textContent = `${yearList.length}件の案件`;
    document.getElementById('yearTotalValue').textContent = yen(yearTotal);

    const groups = {};
    yearList.forEach(p=>{
      const ym = p.delivered.slice(0,7);
      if(!groups[ym]) groups[ym] = [];
      groups[ym].push(p);
    });
    const monthKeys = Object.keys(groups).sort().reverse();

    const wrap = document.getElementById('monthlyList');
    wrap.innerHTML = "";

    monthKeys.forEach(ym=>{
      const list = groups[ym].sort((a,b)=> b.delivered.localeCompare(a.delivered));
      const total = list.reduce((s,p)=> s + Number(p.amount||0), 0);
      const netTotal = list.reduce((s,p)=> s + Number(p.net||0), 0);
      const m = Number(ym.split('-')[1]);

      const item = document.createElement('div');
      item.className = 'month-item' + (openMonths[ym] ? ' open' : '');
      item.innerHTML = `
        <div class="month-head">
          <div class="month-head-left">${m}月<span class="month-head-count">${list.length}件</span></div>
          <div class="month-head-right">
            <span class="month-head-amount">${yen(total)}</span>
            <span class="arrow">▾</span>
          </div>
        </div>
        <div class="month-body">
          <div class="month-row" style="border-top:none;padding-top:0;">
            <div class="mr-name" style="color:var(--sub);font-weight:600;">手取り合計</div>
            <div class="mr-amount" style="color:var(--accent);">${yen(netTotal)}</div>
          </div>
          ${list.map(p=>`
            <div class="month-row">
              <div>
                <div class="mr-name">${escapeHtml(p.name)}</div>
                <div class="mr-client">${escapeHtml(p.client)} ・ ${fmtDate(p.delivered)}納品</div>
              </div>
              <div>
                <div class="mr-amount">${yen(p.amount)}</div>
                <div class="mr-net">手取${yen(p.net)}</div>
              </div>
            </div>
          `).join('')}
        </div>
      `;
      item.querySelector('.month-head').addEventListener('click', ()=>{
        openMonths[ym] = !openMonths[ym];
        item.classList.toggle('open');
      });
      wrap.appendChild(item);
    });
  }

  /* ---------- 全体描画 ---------- */
  function renderAll(){
    renderStats();
    renderProjectList();
    if(currentPage === 'logs') renderLogList();
    if(currentPage === 'sales') renderSalesPage();
  }

  /* ---------- バックアップ／復元 ---------- */
  document.getElementById('backupBtn').addEventListener('click', async ()=>{
    const text = JSON.stringify({projects, workLogs});
    try{
      await navigator.clipboard.writeText(text);
      showToast("クリップボードにコピーしました");
    }catch(e){
      document.getElementById('restoreText').value = text;
      showToast("コピーできない端末です。下の欄からコピーしてください");
    }
  });

  document.getElementById('restoreBtn').addEventListener('click', ()=>{
    const text = document.getElementById('restoreText').value.trim();
    if(!text){ showToast("データを貼り付けてください"); return; }
    try{
      const data = JSON.parse(text);
      let newProjects, newLogs;
      if(Array.isArray(data)){
        // 旧形式(案件配列のみ)
        newProjects = data;
        newLogs = [];
      }else if(data && Array.isArray(data.projects)){
        newProjects = data.projects;
        newLogs = Array.isArray(data.workLogs) ? data.workLogs : [];
      }else{
        throw new Error("形式が不正です");
      }
      if(!confirm("現在のデータに上書きして復元します。よろしいですか？")) return;
      projects = newProjects;
      workLogs = newLogs;
      saveData();
      renderAll();
      document.getElementById('restoreText').value = "";
      showToast("復元しました");
    }catch(e){
      alert("データの形式が正しくありません。正しいバックアップデータを貼り付けてください。");
    }
  });

  /* ---------- 初期化 ---------- */
  loadData();
  renderAll();
})();
</script>

</body>
</html>
